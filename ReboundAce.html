<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rebound Ace | Actuarial Engine</title>
    <style>
        :root { --accent: #d97706; --bg: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        .dashboard { max-width: 700px; margin: auto; background: var(--panel); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; color: #888; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b45309; }
        .result-bar { margin: 20px 0; background: #333; height: 30px; border-radius: 4px; overflow: hidden; display: flex; }
        .bar-segment { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>REBOUND ACE ACTUARIAL ENGINE</h1>
        <div class="input-group">
            <label>Initial Coin-In (USD)</label>
            <input type="number" id="coinIn" value="500">
        </div>
        <div class="input-group">
            <label>Base Kill Rate (%)</label>
            <input type="number" id="killRate" value="30">
        </div>
        <button onclick="calc()">CALCULATE MODEL</button>

        <div id="visuals" style="margin-top:20px;"></div>
        <div id="stats" style="margin-top:20px; font-family: monospace;"></div>
    </div>

    <script>
        function calc() {
            const c = parseFloat(document.getElementById('coinIn').value);
            const k = parseFloat(document.getElementById('killRate').value) / 100;
            const houseEdge = c * k;
            const reserve = c * 0.15;
            const net = houseEdge * 0.85;

            const visual = document.getElementById('visuals');
            visual.innerHTML = `
                <div class="result-bar">
                    <div class="bar-segment" style="width:15%; background:#fbbf24;">RES</div>
                    <div class="bar-segment" style="width:70%; background:var(--accent);">PROFIT</div>
                    <div class="bar-segment" style="width:15%; background:#9ca3af;">COST</div>
                </div>`;
            document.getElementById('stats').innerHTML = `
                <p>Gross Win: $${houseEdge.toFixed(2)}</p>
                <p>Reserve Allocation: $${reserve.toFixed(2)}</p>
                <p><strong>Net Projected Profit: $${net.toFixed(2)}</strong></p>`;
        }
    </script>
</body>
</html>
